<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0a0a0a;
    --bg-elev: #141414;
    --bg-card: #1a1a1a;
    --bg-card-done: #0f0f0f;
    --border: #262626;
    --border-bright: #3a3a3a;
    --text: #f5f5f0;
    --text-2: #a8a8a8;
    --text-3: #6a6a6a;
    --accent: #d4ff3e;
    --accent-dim: #8aa825;
    --warn: #ff6b35;
    --done: #4ade80;
    --shadow: 0 1px 0 rgba(255,255,255,0.04), 0 8px 24px rgba(0,0,0,0.4);
    
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    color: var(--text);
    background: var(--bg);
  }
  
  html, body {
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior-y: none;
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    background-image: 
      radial-gradient(circle at 0% 0%, rgba(212,255,62,0.04) 0%, transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(212,255,62,0.02) 0%, transparent 40%);
    background-attachment: fixed;
  }
  
  /* ============ HEADER ============ */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 10px;
  }
  
  .logo {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.06em;
    line-height: 1;
  }
  
  .logo .slash { color: var(--accent); }
  .logo .dim { color: var(--text-3); }
  
  .week-selector {
    display: flex;
    gap: 4px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    padding: 3px;
    border-radius: 2px;
  }
  
  .week-btn {
    background: transparent;
    color: var(--text-3);
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.05em;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.15s;
    min-width: 34px;
  }
  
  .week-btn.active {
    background: var(--accent);
    color: #000;
  }
  
  .week-btn.deload.active {
    background: var(--warn);
    color: #fff;
  }
  
  /* Day tabs */
  .day-tabs {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  
  .day-tab {
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--text-3);
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.08em;
    padding: 14px 0 10px;
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
  }
  
  .day-tab:last-child { border-right: none; }
  
  .day-tab.active {
    color: var(--text);
  }
  
  .day-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
  }
  
  .day-tab.today::before {
    content: '';
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  
  .day-tab .trt-dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--accent-dim);
    border-radius: 50%;
    margin-left: 2px;
    vertical-align: middle;
    transform: translateY(-3px);
  }
  
  .day-tab.active .trt-dot { background: var(--accent); }
  
  /* ============ DAY HEADER ============ */
  main { padding-bottom: 100px; }
  
  .day-header {
    padding: 24px 16px 18px;
    border-bottom: 1px solid var(--border);
  }
  
  .day-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  
  .day-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-3);
    text-transform: uppercase;
  }
  
  .day-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-2);
    font-weight: 700;
  }
  
  .day-progress .done { color: var(--accent); }
  
  .day-title {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: 38px;
    line-height: 0.95;
    letter-spacing: 0.01em;
    margin-bottom: 8px;
  }
  
  .day-subtitle {
    font-size: 13px;
    color: var(--text-2);
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }
  
  .day-subtitle .pill {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    padding: 3px 8px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
    color: var(--text-2);
    text-transform: uppercase;
  }
  
  .day-subtitle .pill.trt {
    border-color: var(--accent-dim);
    color: var(--accent);
  }
  
  .day-subtitle .pill.deload {
    border-color: var(--warn);
    color: var(--warn);
  }
  
  /* ============ EXERCISE CARDS ============ */
  .exercises {
    padding: 8px 0;
  }
  
  .exercise {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s, opacity 0.2s;
    position: relative;
  }
  
  .exercise.done {
    background: var(--bg-card-done);
  }
  
  .exercise.done .ex-name,
  .exercise.done .ex-prescription {
    opacity: 0.4;
  }
  
  .exercise.done::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  
  .exercise.primary {
    background: linear-gradient(90deg, rgba(212,255,62,0.04) 0%, transparent 50%);
  }
  
  .exercise.primary.done {
    background: var(--bg-card-done);
  }
  
  /* Checkbox */
  .ex-check {
    flex-shrink: 0;
    width: 56px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 18px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  
  .ex-check input {
    appearance: none;
    -webkit-appearance: none;
    width: 26px;
    height: 26px;
    border: 2px solid var(--border-bright);
    background: var(--bg-elev);
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
  }
  
  .ex-check input:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  
  .ex-check input:checked::after {
    content: '';
    position: absolute;
    left: 7px;
    top: 2px;
    width: 8px;
    height: 14px;
    border: solid #000;
    border-width: 0 3px 3px 0;
    transform: rotate(45deg);
  }
  
  .ex-check input:active {
    transform: scale(0.9);
  }
  
  /* Body */
  .ex-body {
    flex: 1;
    padding: 16px 16px 16px 0;
    min-width: 0;
  }
  
  .ex-name {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 800;
    font-size: 19px;
    line-height: 1.15;
    letter-spacing: 0.01em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  
  .ex-name .ex-num {
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-right: 6px;
    font-weight: 500;
  }
  
  .ex-prescription {
    display: flex;
    gap: 18px;
    margin-bottom: 6px;
    align-items: baseline;
  }
  
  .ex-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  
  .ex-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-3);
    text-transform: uppercase;
  }
  
  .ex-stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  
  .ex-stat.rpe .ex-stat-value {
    color: var(--accent);
  }
  
  .ex-stat.intensity .ex-stat-value {
    color: var(--accent);
    font-size: 13px;
    line-height: 1.2;
  }
  
  /* Load tracker */
  .ex-load {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }
  
  .ex-load-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-3);
    text-transform: uppercase;
  }
  
  .ex-load-input {
    background: var(--bg-elev);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    padding: 6px 8px;
    width: 80px;
    text-align: center;
    border-radius: 0;
    appearance: none;
    -webkit-appearance: none;
  }
  
  .ex-load-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  .ex-load-unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-3);
  }
  
  .ex-load-prev {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.05em;
  }
  
  /* Notes */
  .ex-notes-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: none;
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 0 0;
    cursor: pointer;
    transition: color 0.15s;
  }
  
  .ex-notes-toggle:hover { color: var(--text-2); }
  
  .ex-notes-toggle .arrow {
    transition: transform 0.2s;
    display: inline-block;
  }
  
  .ex-notes-toggle.open .arrow { transform: rotate(90deg); }
  
  .ex-notes {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease-out;
    margin-top: 0;
  }
  
  .ex-notes.open {
    max-height: 400px;
    margin-top: 8px;
  }
  
  .ex-notes-content {
    background: var(--bg-elev);
    border-left: 2px solid var(--accent);
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-2);
  }
  
  /* ============ SPECIAL DAYS ============ */
  .cardio-day {
    padding: 24px 16px;
  }
  
  .cardio-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 20px;
    margin-top: 16px;
  }
  
  .cardio-card h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  
  .cardio-card p {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-2);
    margin-bottom: 8px;
  }
  
  .cardio-card p:last-child { margin-bottom: 0; }
  
  .cardio-card strong {
    color: var(--text);
    font-weight: 500;
  }
  
  .rest-day {
    padding: 80px 24px;
    text-align: center;
  }
  
  .rest-day .glyph {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: 80px;
    color: var(--border-bright);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  
  .rest-day .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-3);
    text-transform: uppercase;
    margin-top: 16px;
  }
  
  .rest-day .quote {
    font-size: 14px;
    color: var(--text-2);
    margin-top: 24px;
    line-height: 1.5;
    max-width: 280px;
    margin-left: auto;
    margin-right: auto;
  }
  
  /* ============ DELOAD OVERRIDE ============ */
  .deload-banner {
    margin: 16px;
    padding: 14px 16px;
    background: rgba(255,107,53,0.08);
    border: 1px solid var(--warn);
    border-left-width: 3px;
  }
  
  .deload-banner-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--warn);
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 700;
  }
  
  .deload-banner-text {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.4;
  }
  
  /* ============ FOOTER / FAB ============ */
  .footer-actions {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
    pointer-events: none;
    z-index: 50;
  }
  
  .reset-btn {
    pointer-events: auto;
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--border-bright);
    color: var(--text-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  
  .reset-btn:hover, .reset-btn:active {
    border-color: var(--warn);
    color: var(--warn);
  }
  
  /* ============ DESKTOP BREAKPOINT ============ */
  @media (min-width: 720px) {
    .header-row { padding: 18px 24px 14px; }
    .day-header { padding: 32px 24px 22px; }
    .day-title { font-size: 56px; }
    .ex-body { padding: 20px 24px 20px 0; }
    .ex-check { width: 64px; padding-top: 22px; }
    .ex-name { font-size: 22px; }
    .footer-actions { padding-left: 24px; padding-right: 24px; }
    .reset-btn { max-width: 320px; margin: 0 auto; display: block; }
    .cardio-day { padding: 32px 24px; }
  }
  
  /* ============ ANIMATIONS ============ */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .fade-in {
    animation: fadeIn 0.2s ease-out;
  }
  
  /* Hide number input arrows */
  .ex-load-input::-webkit-outer-spin-button,
  .ex-load-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .ex-load-input { -moz-appearance: textfield; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">PWR<span class="slash">/</span><span class="dim">PEDRO</span></div>
    <div class="week-selector" id="weekSelector">
      <button class="week-btn" data-week="1">W1</button>
      <button class="week-btn" data-week="2">W2</button>
      <button class="week-btn" data-week="3">W3</button>
      <button class="week-btn deload" data-week="deload">DLD</button>
    </div>
  </div>
  <nav class="day-tabs" id="dayTabs"></nav>
</header>

<main id="main"></main>

<div class="footer-actions">
  <button class="reset-btn" id="resetBtn">RESET DIA ATUAL</button>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const PROGRAM = {
  seg: {
    title: "SQUAT DAY",
    eyebrow: "Força — Lower",
    pills: ["TRT", "80–95min"],
    trt: true,
    exercises: [
      {
        id: "sq1", name: "Agachamento livre", primary: true,
        sets: 4, reps: "4", rpeByWeek: { 1: "7", 2: "8", 3: "8.5" },
        deload: { sets: 3, reps: "5", intensity: "60% 1RM", rpe: "6" },
        notes: "Aquecimento progressivo até série de trabalho. Pausa no buraco opcional na semana 2. Bracing diafragmático antes de descer."
      },
      {
        id: "sq2", name: "Agachamento frontal OU pause squat", primary: false,
        sets: 3, reps: "5", rpe: "7",
        deloadCut: true,
        notes: "Variação técnica. Alternar semana a semana — frontal em ímpares, pause em pares. Reforça core e posição vertical."
      },
      {
        id: "sq3", name: "Stiff / RDL", primary: false,
        sets: 4, reps: "8", rpe: "7-8",
        deloadCut: true,
        notes: "Carga controlada, foco em estiramento e bracing. Quadril vai pra trás, joelho macio, barra rente à perna."
      },
      {
        id: "sq4", name: "Búlgaro com halter", primary: false,
        sets: 3, reps: "10/perna", rpe: "8",
        deloadHalf: true,
        notes: "Unilateral, corrige assimetrias, baixa carga axial. Pé de trás na bench, joelho da frente alinhado."
      },
      {
        id: "sq5", name: "Mesa flexora (leg curl)", primary: false,

const DAYS = ['seg','ter','qua','qui','sex','sab','dom'];
const DAY_LABELS = { seg:'SEG', ter:'TER', qua:'QUA', qui:'QUI', sex:'SEX', sab:'SAB', dom:'DOM' };
const JS_DAY_TO_KEY = ['dom','seg','ter','qua','qui','sex','sab']; // JS getDay() → 0=Sun

// ============================================================
// STATE & STORAGE
// ============================================================
const STATE = {
  week: '1',
  day: 'seg',
  checks: {},
  loads: {}
};

function loadState() {
  try {
    const checks = localStorage.getItem('pwr.checks');
    const loads = localStorage.getItem('pwr.loads');
    const week = localStorage.getItem('pwr.week');
    if (checks) STATE.checks = JSON.parse(checks);
    if (loads) STATE.loads = JSON.parse(loads);
    if (week) STATE.week = week;
  } catch(e) { console.warn('State load failed', e); }
}

function saveChecks() { localStorage.setItem('pwr.checks', JSON.stringify(STATE.checks)); }
function saveLoads() { localStorage.setItem('pwr.loads', JSON.stringify(STATE.loads)); }
function saveWeek() { localStorage.setItem('pwr.week', STATE.week); }

function checkKey(week, day, exId) { return `${week}::${day}::${exId}`; }
function loadKey(week, day, exId) { return `${week}::${day}::${exId}`; }

function isChecked(week, day, exId) { return !!STATE.checks[checkKey(week, day, exId)]; }
function setChecked(week, day, exId, val) {
  const k = checkKey(week, day, exId);
  if (val) STATE.checks[k] = true;
  else delete STATE.checks[k];
  saveChecks();
}

function getLoad(week, day, exId) { return STATE.loads[loadKey(week, day, exId)] || ''; }
function setLoad(week, day, exId, val) {
  const k = loadKey(week, day, exId);
  if (val) STATE.loads[k] = val;
  else delete STATE.loads[k];
  saveLoads();
}

function getPrevLoad(week, day, exId) {
  // Look at previous weeks for this exercise
  const weeks = ['1','2','3'];
  const currentIdx = weeks.indexOf(week);
  if (currentIdx <= 0) return '';
  for (let i = currentIdx - 1; i >= 0; i--) {
    const v = STATE.loads[loadKey(weeks[i], day, exId)];
    if (v) return `W${weeks[i]}: ${v}kg`;
  }
  return '';
}

// ============================================================
// RENDERING
// ============================================================
function getRpe(ex, week) {
  if (week === 'deload') return ex.deload?.rpe || ex.rpe || '6';
  if (ex.rpeByWeek && ex.rpeByWeek[week]) return ex.rpeByWeek[week];
  return ex.rpe || '';
}

function getPrescription(ex, week) {
  if (week === 'deload') {
    if (ex.deload) {
      return { sets: ex.deload.sets, reps: ex.deload.reps, intensity: ex.deload.intensity, rpe: ex.deload.rpe };
    }
    return { sets: ex.sets, reps: ex.reps, rpe: getRpe(ex, week), intensity: ex.intensity };
  }
  return { sets: ex.sets, reps: ex.reps, rpe: getRpe(ex, week), intensity: ex.intensity };
}

function shouldHideOnDeload(ex) { return !!ex.deloadCut; }
function shouldDimOnDeload(ex) { return !!ex.deloadHalf; }

function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  const todayKey = JS_DAY_TO_KEY[new Date().getDay()];
  container.innerHTML = DAYS.map(d => {
    const data = PROGRAM[d];
    const isActive = STATE.day === d ? 'active' : '';
    const isToday = todayKey === d ? 'today' : '';
    const trtDot = data.trt ? '<span class="trt-dot"></span>' : '';
    return `<button class="day-tab ${isActive} ${isToday}" data-day="${d}">${DAY_LABELS[d]}${trtDot}</button>`;
  }).join('');
  
  container.querySelectorAll('.day-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      STATE.day = btn.dataset.day;
      renderDayTabs();
      renderMain();
      window.scrollTo(0, 0);
    });
  });
}

function renderWeekSelector() {
  document.querySelectorAll('.week-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.week === STATE.week);
    btn.onclick = () => {
      STATE.week = btn.dataset.week;
      saveWeek();
      renderWeekSelector();
      renderMain();
    };
  });
}

function renderMain() {
  const main = document.getElementById('main');
  const day = PROGRAM[STATE.day];
  const isDeload = STATE.week === 'deload';
  
  let html = '';
  
  // Day header
  let pills = [...day.pills];
  if (isDeload && (STATE.day === 'sex' || day.deloadCutAll)) {
    pills = ['DELOAD', 'OFF / Cardio Z2'];
  } else if (isDeload) {
    pills = ['DELOAD', ...pills.filter(p => !p.includes('min'))];
  }
  
  const pillsHtml = pills.map(p => {
    let cls = 'pill';
    if (p === 'TRT') cls += ' trt';
    if (p === 'DELOAD') cls += ' deload';
    return `<span class="${cls}">${p}</span>`;
  }).join('');
  
  // Progress
  let totalEx = 0, doneEx = 0;
  if (day.exercises && !(isDeload && day.deloadCutAll)) {
    day.exercises.forEach(ex => {
      if (isDeload && shouldHideOnDeload(ex)) return;
      totalEx++;
      if (isChecked(STATE.week, STATE.day, ex.id)) doneEx++;
    });
  }
  const progressHtml = totalEx > 0 ? 
    `<div class="day-progress"><span class="done">${String(doneEx).padStart(2,'0')}</span> / ${String(totalEx).padStart(2,'0')}</div>` : '';
  
  html += `
    <div class="day-header fade-in">
      <div class="day-meta">
        <div class="day-eyebrow">${day.eyebrow}</div>
        ${progressHtml}
      </div>
      <h1 class="day-title">${day.title}</h1>
      <div class="day-subtitle">${pillsHtml}</div>
    </div>
  `;
  
  // Deload special cases
  if (isDeload && day.deloadCutAll) {
    html += `
      <div class="deload-banner fade-in">
        <div class="deload-banner-title">SEMANA DE DELOAD</div>
        <div class="deload-banner-text">Sexta-feira é cortada na semana de deload. Substituir por cardio Z2 leve ou descanso total. O objetivo é manutenção neural, não acúmulo.</div>
      </div>
      <div class="rest-day fade-in">
        <div class="glyph">—</div>
        <div class="label">Off / Cardio Z2 opcional</div>
      </div>
    `;
    main.innerHTML = html;
    return;
  }
  
  if (day.cardio) {
    const c = day.cardioContent;
    html += `
      <div class="cardio-day fade-in">
        <div class="cardio-card">
          <h3>${c.protocol}</h3>
          <p><strong>FC alvo:</strong> ${c.heartRate}</p>
          <p><strong>Duração:</strong> ${c.duration}</p>
          <p><strong>Modalidades:</strong> ${c.modes}</p>
        </div>
        <div class="cardio-card">
          <h3>Cue subjetivo</h3>
          <p>${c.cue}</p>
        </div>
        <div class="cardio-card">
          <h3>Por quê</h3>
          <p>${c.why}</p>
        </div>
      </div>
    `;
    main.innerHTML = html;
    return;
  }
  
  if (day.rest) {
    html += `
      <div class="rest-day fade-in">
        <div class="glyph">·</div>
        <div class="label">Recovery total</div>
        <div class="quote">Sono, hidratação, comida boa. O músculo cresce na recuperação, não no treino.</div>
      </div>
    `;
    main.innerHTML = html;
    return;
  }
  
  // Deload banner for normal training days
  if (isDeload) {
    html += `
      <div class="deload-banner fade-in">
        <div class="deload-banner-title">SEMANA DE DELOAD</div>
        <div class="deload-banner-text">Lift principal a 60% do 1RM, RPE 6. Acessórios cortados em volume. Variações técnicas pulam essa semana.</div>
      </div>
    `;
  }
  
  // Exercises
  html += '<div class="exercises">';
  day.exercises.forEach((ex, idx) => {
    if (isDeload && shouldHideOnDeload(ex)) return;
    
    const checked = isChecked(STATE.week, STATE.day, ex.id);
    const presc = getPrescription(ex, STATE.week);
    const load = getLoad(STATE.week, STATE.day, ex.id);
    const prevLoad = getPrevLoad(STATE.week, STATE.day, ex.id);
    
    const classes = ['exercise'];
    if (checked) classes.push('done');
    if (ex.primary) classes.push('primary');
    
    // Build prescription stats
    const stats = [];
    stats.push(`<div class="ex-stat"><div class="ex-stat-label">Sets</div><div class="ex-stat-value">${String(presc.sets).padStart(2,'0')}</div></div>`);
    stats.push(`<div class="ex-stat"><div class="ex-stat-label">Reps</div><div class="ex-stat-value">${presc.reps}</div></div>`);
    if (presc.intensity) {
      stats.push(`<div class="ex-stat intensity"><div class="ex-stat-label">Intens</div><div class="ex-stat-value">${presc.intensity}</div></div>`);
    } else if (presc.rpe) {
      stats.push(`<div class="ex-stat rpe"><div class="ex-stat-label">RPE</div><div class="ex-stat-value">${presc.rpe}</div></div>`);
    }
    
    const num = String(idx + 1).padStart(2, '0');
    
    html += `
      <div class="${classes.join(' ')}" data-ex-id="${ex.id}">
        <label class="ex-check">
          <input type="checkbox" ${checked ? 'checked' : ''} data-ex-id="${ex.id}">
        </label>
        <div class="ex-body">
          <div class="ex-name"><span class="ex-num">${num}</span>${ex.name}</div>
          <div class="ex-prescription">${stats.join('')}</div>
          <div class="ex-load">
            <span class="ex-load-label">Carga</span>
            <input type="number" inputmode="decimal" step="0.5" class="ex-load-input" data-ex-id="${ex.id}" value="${load}" placeholder="—">
            <span class="ex-load-unit">kg</span>
            ${prevLoad ? `<span class="ex-load-prev">${prevLoad}</span>` : ''}
          </div>
          <button class="ex-notes-toggle" data-ex-id="${ex.id}">
            <span class="arrow">▸</span> Notas
          </button>
          <div class="ex-notes" data-notes-for="${ex.id}">
            <div class="ex-notes-content">${ex.notes}</div>
          </div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  
  main.innerHTML = html;
  attachExerciseHandlers();
}

function attachExerciseHandlers() {
  // Checkboxes
  document.querySelectorAll('.ex-check input').forEach(input => {
    input.addEventListener('change', (e) => {
      const exId = e.target.dataset.exId;
      setChecked(STATE.week, STATE.day, exId, e.target.checked);
      // Update card visual
      const card = e.target.closest('.exercise');
      card.classList.toggle('done', e.target.checked);
      // Update progress counter
      updateProgress();
      // Haptic feedback
      if (e.target.checked && navigator.vibrate) navigator.vibrate(20);
    });
  });
  
  // Load inputs
  document.querySelectorAll('.ex-load-input').forEach(input => {
    input.addEventListener('change', (e) => {
      setLoad(STATE.week, STATE.day, e.target.dataset.exId, e.target.value);
    });
    input.addEventListener('blur', (e) => {
      setLoad(STATE.week, STATE.day, e.target.dataset.exId, e.target.value);
    });
  });
  
  // Notes toggle
  document.querySelectorAll('.ex-notes-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const exId = btn.dataset.exId;
      const notes = document.querySelector(`.ex-notes[data-notes-for="${exId}"]`);
      btn.classList.toggle('open');
      notes.classList.toggle('open');
    });
  });
}

function updateProgress() {
  const day = PROGRAM[STATE.day];
  const isDeload = STATE.week === 'deload';
  if (!day.exercises) return;
  
  let total = 0, done = 0;
  day.exercises.forEach(ex => {
    if (isDeload && shouldHideOnDeload(ex)) return;
    total++;
    if (isChecked(STATE.week, STATE.day, ex.id)) done++;
  });
  
  const el = document.querySelector('.day-progress');
  if (el) {
    el.innerHTML = `<span class="done">${String(done).padStart(2,'0')}</span> / ${String(total).padStart(2,'0')}`;
  }
}

// Reset day
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm(`Resetar checkboxes de ${DAY_LABELS[STATE.day]} (Semana ${STATE.week.toUpperCase()})?`)) return;
  const prefix = `${STATE.week}::${STATE.day}::`;
  Object.keys(STATE.checks).forEach(k => {
    if (k.startsWith(prefix)) delete STATE.checks[k];
  });
  saveChecks();
  renderMain();
  if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
});

// ============================================================
// INIT
// ============================================================
loadState();

// Default to today
const todayKey = JS_DAY_TO_KEY[new Date().getDay()];
if (PROGRAM[todayKey]) STATE.day = todayKey;

renderWeekSelector();
renderDayTabs();
renderMain();

// Prevent accidental zoom on double-tap of inputs (iOS)
document.addEventListener('dblclick', (e) => {
  if (e.target.tagName !== 'INPUT') e.preventDefault();
});
</script>
