<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>WBrC Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0a;--surface:#1a1a1a;--border:#2a2a2a;--text:#ffffff;--text-dim:#888888;
--text-muted:#555555;--green:#00c853;--green-bg:#001a0d;--yellow:#ffc107;
--yellow-bg:#1a1500;--red:#ff3d00;--red-bg:#1a0500;--blue:#2196f3;--blue-bg:#001a2a;
--gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;
opacity:0;pointer-events:none;transition:opacity .2s}
.screen.active{opacity:1;pointer-events:all}

/* ══ HEADER ══ */
.s1-top{padding:24px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.s1-brand{display:inline-flex;align-items:center;gap:8px;
background:linear-gradient(135deg,#f09433,#dc2743);padding:6px 14px;
border-radius:20px;text-decoration:none;margin-bottom:16px;
box-shadow:0 2px 12px rgba(220,39,67,.4)}
.s1-brand-icon{font-size:16px}
.s1-brand-text{font-size:12px;font-weight:800;color:#fff;letter-spacing:.3px}
.s1-title{font-size:24px;font-weight:900;color:var(--text);margin-bottom:4px;letter-spacing:-.5px}
.s1-sub{font-size:13px;font-weight:500;color:var(--text-dim)}
.s1-list{flex:1;overflow-y:auto;padding:8px 20px 24px}
.s1-list::-webkit-scrollbar{display:none}

/* ══ YEAR GROUP ══ */
.year-group{margin-bottom:24px}
.year-header{font-family:'JetBrains Mono',monospace;font-size:16px;
font-weight:700;color:var(--text-dim);margin-bottom:12px;
padding-bottom:8px;border-bottom:1px solid var(--border)}

/* ══ RECIPE CARD ══ */
.recipe-card{background:var(--surface);border:2px solid var(--border);
border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;
transition:all .15s;position:relative}
.recipe-card:active{transform:scale(.98);border-color:var(--green);background:#151515}
.recipe-card.place-1{border-left:4px solid var(--gold)}
.recipe-card.place-2{border-left:4px solid var(--silver)}
.recipe-card.place-3{border-left:4px solid var(--bronze)}
.rc-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.rc-place{font-size:26px;line-height:1;flex-shrink:0}
.rc-flag{font-size:26px;flex-shrink:0}
.rc-info{flex:1;min-width:0}
.rc-name{font-size:15px;font-weight:800;color:var(--text);
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.3px}
.rc-method{font-size:11px;font-weight:600;color:var(--text-dim);margin-top:1px}
.rc-ratio{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
background:var(--green);color:#fff;padding:2px 8px;border-radius:10px;
flex-shrink:0;align-self:flex-start;margin-top:2px}
.rc-variant-hint{font-size:11px;font-weight:700;color:var(--green);margin-top:4px;
padding-left:36px}

/* ══ VARIANTS SCREEN ══ */
.var-list{flex:1;overflow-y:auto;padding:12px 20px 24px}
.var-list::-webkit-scrollbar{display:none}
.var-card{background:var(--surface);border:2px solid var(--border);
border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.var-card:active{transform:scale(.98);border-color:var(--green);background:#151515}
.var-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.var-name{font-size:16px;font-weight:800}
.var-emoji{font-size:18px}
.var-formula{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
color:var(--green);background:var(--green-bg);display:inline-block;
padding:3px 10px;border-radius:6px;margin-bottom:6px}
.var-desc{font-size:12px;color:var(--text-dim)}

/* ══ NAV BAR ══ */
.s2-nav{display:flex;align-items:center;padding:20px;
border-bottom:1px solid var(--border);flex-shrink:0}
.back-btn{width:48px;height:48px;background:var(--surface);
border:2px solid var(--border);border-radius:12px;color:var(--text);
font-size:24px;display:flex;align-items:center;justify-content:center;
cursor:pointer;flex-shrink:0;font-family:inherit}
.back-btn:active{background:var(--border)}
.s2-title{flex:1;text-align:center;font-size:18px;font-weight:800;
color:var(--text);margin:0 16px}

/* ══ SETUP ══ */
.s2-body{flex:1;overflow-y:auto;padding:20px}
.s2-body::-webkit-scrollbar{display:none}
.dose-section{background:var(--surface);border:2px solid var(--border);
border-radius:16px;padding:24px;margin-bottom:20px}
.dose-label{font-size:12px;font-weight:700;color:var(--text-dim);
text-transform:uppercase;letter-spacing:1px;margin-bottom:20px;text-align:center}
.dose-control{display:flex;align-items:center;justify-content:center;gap:20px}
.dose-btn{width:64px;height:64px;background:var(--bg);
border:3px solid var(--green);border-radius:50%;color:var(--green);
font-size:32px;font-weight:700;display:flex;align-items:center;
justify-content:center;cursor:pointer;font-family:inherit}
.dose-btn:active{background:var(--green);color:var(--bg)}
.dose-value{font-family:'JetBrains Mono',monospace;font-size:72px;
font-weight:700;color:var(--text);line-height:1;min-width:140px;text-align:center}
.dose-unit{font-size:16px;font-weight:700;color:var(--text-dim);
text-align:center;margin-top:8px;text-transform:uppercase;letter-spacing:1px}
.water-sum{background:var(--blue-bg);border:2px solid var(--blue);
border-radius:12px;padding:16px;margin-top:20px;display:flex;
align-items:center;justify-content:center;gap:12px}
.water-label{font-size:14px;font-weight:700;color:var(--text-dim);text-transform:uppercase}
.water-value{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:var(--blue)}
.water-unit{font-size:14px;font-weight:700;color:var(--text-dim)}
.pours-section{background:var(--surface);border:2px solid var(--border);
border-radius:16px;padding:20px;margin-bottom:100px}
.pours-title{font-size:12px;font-weight:700;color:var(--text-dim);
text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.pour-row{display:grid;grid-template-columns:1fr 52px 60px;gap:12px;
padding:12px 0;border-bottom:1px solid var(--border)}
.pour-row:last-child{border-bottom:none}
.pour-name{font-size:14px;font-weight:700;color:var(--text)}
.pour-temp{font-family:'JetBrains Mono',monospace;font-size:14px;
font-weight:700;color:var(--blue);text-align:center}
.pour-amt{font-family:'JetBrains Mono',monospace;font-size:14px;
font-weight:700;color:var(--text);text-align:right}
.start-btn{position:fixed;bottom:24px;left:20px;right:20px;height:72px;
background:var(--green);border:none;border-radius:16px;color:#000;
font-size:20px;font-weight:900;letter-spacing:.5px;cursor:pointer;
font-family:inherit;box-shadow:0 8px 32px rgba(0,200,83,.4)}
.start-btn:active{transform:translateY(2px);box-shadow:0 4px 16px rgba(0,200,83,.4)}

/* ══ BREW SCREEN ══ */
.s3-top{display:flex;align-items:center;justify-content:space-between;
padding:20px;border-bottom:1px solid var(--border);flex-shrink:0}
.timer-clock{font-family:'JetBrains Mono',monospace;font-size:28px;
font-weight:700;color:var(--text);letter-spacing:2px}
.progress-dots{display:flex;gap:5px;align-items:center}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);transition:all .2s}
.pdot.active{width:10px;height:10px;background:var(--green)}
.pdot.done{background:#006630}
.reset-btn{background:var(--surface);border:2px solid var(--border);
border-radius:8px;padding:8px 16px;color:var(--text-dim);font-size:12px;
font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit}
.reset-btn:active{background:var(--red);color:#fff;border-color:var(--red)}
.s3-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.next-bar{padding:12px 20px;background:var(--surface);
border-bottom:1px solid var(--border);flex-shrink:0}
.next-bar.urgent{background:var(--yellow-bg);border-bottom:2px solid var(--yellow);
animation:pulse-border .8s ease-in-out infinite}
.next-bar.critical{background:var(--red-bg);border-bottom:2px solid var(--red);
animation:pulse-border .4s ease-in-out infinite}
@keyframes pulse-border{0%,100%{opacity:1}50%{opacity:.5}}
.next-content{display:flex;align-items:center;justify-content:space-between;gap:12px}
.next-label{font-size:10px;font-weight:800;color:var(--text-muted);
text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.next-action{font-size:13px;font-weight:700;color:var(--text);flex:1;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.next-bar.urgent .next-action{color:var(--yellow)}
.next-bar.critical .next-action{color:var(--red)}
.next-countdown{font-family:'JetBrains Mono',monospace;font-size:20px;
font-weight:700;color:var(--text-dim);flex-shrink:0}
.next-bar.urgent .next-countdown{color:var(--yellow)}
.next-bar.critical .next-countdown{color:var(--red)}
.step-area{flex:1;display:flex;flex-direction:column;align-items:center;
justify-content:center;padding:24px 20px;position:relative}

/* ══ STEP CARDS ══ */
.step-pour{width:100%;background:var(--green-bg);border:3px solid var(--green);
border-radius:20px;padding:32px 24px;text-align:center}
.step-type{font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.step-pour .step-type{color:var(--green)}
.step-name{font-size:28px;font-weight:900;color:var(--text);margin-bottom:28px;letter-spacing:-.5px;line-height:1.2}
.step-values{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.value-box{background:var(--bg);border-radius:12px;padding:20px 16px}
.value-label{font-size:11px;font-weight:800;color:var(--text-muted);
text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.value-main{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;margin-bottom:4px}
.step-pour .value-main{color:var(--green)}
.value-unit{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase}
.step-progress{background:var(--border);height:8px;border-radius:4px;overflow:hidden;margin-bottom:16px}
.step-progress-fill{height:100%;background:var(--green);transition:width .3s ease;border-radius:4px}
/* Acumulado GRANDE (melhoria #3) */
.step-accum-big{margin-top:8px;padding:16px 20px;background:var(--bg);
border:2px solid var(--border);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.accum-label{font-size:14px;font-weight:800;color:var(--text-muted);
text-transform:uppercase;letter-spacing:4px;margin-bottom:4px}
.accum-val{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:700;
color:var(--green);line-height:1}
.accum-unit{font-size:28px;font-weight:700;color:var(--text-dim);margin-left:4px}
.accum-total{font-family:'JetBrains Mono',monospace;font-size:16px;
font-weight:700;color:var(--text-muted);margin-top:4px}

.step-wait{width:100%;background:var(--blue-bg);border:3px solid var(--blue);
border-radius:20px;padding:32px 24px;text-align:center}
.step-wait .step-type{color:var(--blue)}
.countdown-ring{width:180px;height:180px;margin:0 auto 24px;position:relative}
.countdown-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:12}
.ring-fill{fill:none;stroke:var(--blue);stroke-width:12;stroke-linecap:round;
transition:stroke-dashoffset 1s linear}
.ring-time{position:absolute;inset:0;display:flex;align-items:center;
justify-content:center;font-family:'JetBrains Mono',monospace;font-size:56px;
font-weight:700;color:var(--blue)}
.step-drain{width:100%;background:var(--surface);border:3px solid var(--border);
border-radius:20px;padding:32px 24px;text-align:center}
.step-drain .step-type{color:var(--text-dim)}
.step-drain .ring-fill{stroke:var(--text-dim)}
.step-drain .ring-time{color:var(--text-dim)}
.step-serve{width:100%;background:var(--green-bg);border:3px solid var(--green);
border-radius:20px;padding:32px 24px;text-align:center}
.step-serve .step-type{color:var(--green)}
.serve-icon{font-size:72px;margin-bottom:20px;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ══ OVERLAYS ══ */
.countdown-overlay{position:fixed;inset:0;background:var(--bg);
display:flex;flex-direction:column;align-items:center;justify-content:center;
z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.countdown-overlay.show{opacity:1;pointer-events:all}
.countdown-num{font-family:'JetBrains Mono',monospace;font-size:160px;
font-weight:700;color:var(--green);line-height:1;animation:pop .25s ease-out}
@keyframes pop{from{transform:scale(1.3);opacity:0}to{transform:scale(1);opacity:1}}
.countdown-msg{font-size:20px;font-weight:700;color:var(--text-dim);margin-top:20px}
.countdown-go{font-size:64px;font-weight:900;color:var(--green);animation:pop .25s ease-out}
.finish-overlay{position:fixed;inset:0;background:var(--bg);
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:40px;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.finish-overlay.show{opacity:1;pointer-events:all}
.finish-icon{font-size:80px;margin-bottom:24px;animation:float 2s ease-in-out infinite}
.finish-title{font-size:40px;font-weight:900;color:var(--text);margin-bottom:12px;letter-spacing:-1px}
.finish-time{font-family:'JetBrains Mono',monospace;font-size:32px;
font-weight:700;color:var(--green);margin-bottom:32px}
.finish-sub{font-size:14px;color:var(--text-dim);text-align:center;line-height:1.6;margin-bottom:32px}
.finish-btn{width:100%;max-width:320px;height:64px;background:var(--green);
border:none;border-radius:16px;color:#000;font-size:18px;font-weight:900;
cursor:pointer;font-family:inherit}
.flash{position:fixed;inset:0;background:var(--green);opacity:0;pointer-events:none;
z-index:99;transition:opacity .05s}
.flash.show{opacity:.15}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="countdown-overlay" id="cd-overlay">
<div class="countdown-num" id="cd-num">3</div>
<div class="countdown-msg" id="cd-msg">Prepare-se…</div>
</div>

<div class="finish-overlay" id="finish">
<div class="finish-icon">☕</div>
<div class="finish-title">Pronto!</div>
<div class="finish-time" id="finish-time">00:00</div>
<div class="finish-sub" id="finish-sub"></div>
<button class="finish-btn" onclick="goHome()">Nova Extração</button>
</div>

<!-- SCREEN 1: SELECT -->
<div id="s-select" class="screen active">
<div class="s1-top">
<a href="https://www.instagram.com/original.coffee.roaster/" target="_blank" class="s1-brand">
<span class="s1-brand-icon">📷</span>
<span class="s1-brand-text">@original.coffee.roaster</span>
</a>
<div class="s1-title">WBrC Timer</div>
<div class="s1-sub">Timer automático · Top 3 Campeões 2015–2025</div>
</div>
<div class="s1-list" id="recipe-list"></div>
</div>

<!-- SCREEN: KASUYA VARIANTS -->
<div id="s-variants" class="screen">
<div class="s2-nav">
<button class="back-btn" onclick="goBack()">←</button>
<div class="s2-title">🇯🇵 Tetsu Kasuya · Método 4:6</div>
<div style="width:48px"></div>
</div>
<div class="var-list" id="var-list"></div>
</div>

<!-- SCREEN 2: SETUP -->
<div id="s-setup" class="screen">
<div class="s2-nav">
<button class="back-btn" onclick="goBack()">←</button>
<div class="s2-title" id="s2-title">Setup</div>
<div style="width:48px"></div>
</div>
<div class="s2-body">
<div class="dose-section">
<div class="dose-label">Dose de Café</div>
<div class="dose-control">
<button class="dose-btn" onclick="changeDose(-1)">−</button>
<div>
<div class="dose-value" id="dose-val">18</div>
<div class="dose-unit">gramas</div>
</div>
<button class="dose-btn" onclick="changeDose(1)">+</button>
</div>
<div class="water-sum">
<span class="water-label">Total</span>
<span class="water-value" id="water-val">270</span>
<span class="water-unit">ml</span>
</div>
</div>
<div class="pours-section">
<div class="pours-title">Despejos</div>
<div id="pours-table"></div>
</div>
</div>
<button class="start-btn" onclick="beginCountdown()">Iniciar Timer</button>
</div>

<!-- SCREEN 3: BREW -->
<div id="s-brew" class="screen">
<div class="s3-top">
<div class="timer-clock" id="brew-clock">00:00</div>
<div class="progress-dots" id="prog-dots"></div>
<button class="reset-btn" onclick="confirmReset()">Reset</button>
</div>
<div class="s3-main">
<div class="next-bar" id="next-bar">
<div class="next-content">
<span class="next-label">A seguir</span>
<span class="next-action">—</span>
<span class="next-countdown">—</span>
</div>
</div>
<div class="step-area" id="step-area"></div>
</div>
</div>

<script>

   STATE & HELPERS
   ═══════════════════════════════════════════ */
let R=null,dose=18,t0=null,curIdx=0,ticker=null,audioCtx=null,wlock=null;
let cameFromVariants=false;
const medals={1:'🥇',2:'🥈',3:'🥉'};
const rnd=v=>Math.round(v);
const totalW=()=>dose*R.ratio;
const pourMl=s=>s.frac?s.frac*totalW():0;
const fmtMs=ms=>{const s=Math.floor(ms/1000),m=Math.floor(s/60);return`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`};
const fmtS=s=>{s=Math.max(0,s);return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`};
function accumulatedAt(idx){let sum=0;for(let i=0;i<=idx;i++)if(R.steps[i].type==='pour')sum+=pourMl(R.steps[i]);return sum;}

/* Audio — resume() é obrigatório no mobile (iOS/Android bloqueiam AudioContext até interação) */
function ensureAudio(){
if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
if(audioCtx.state==='suspended') audioCtx.resume();
}
function beep(f=660,d=.3,v=.3){try{ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d);}catch(e){}}
function beepSeq(seq){seq.forEach(([f,d,v,t])=>setTimeout(()=>beep(f,d,v),t*1000));}
function vib(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}

/* Wake Lock — tela sempre acesa enquanto o app estiver ativo */
let wlActive=false;
async function wakeLockOn(){
try{if('wakeLock'in navigator){wlock=await navigator.wakeLock.request('screen');wlActive=true;}}catch(e){}
}
function wakeLockOff(){
wlActive=false;
if(wlock){try{wlock.release();}catch(e){}wlock=null;}
}
/* Re-adquire wake lock ao voltar pra aba (browser libera ao sair) */
document.addEventListener('visibilitychange',()=>{
if(document.visibilityState==='visible'&&wlActive) wakeLockOn();
});
function flash(){const el=document.getElementById('flash');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),100);}

/* ═══ NAVIGATION ═══ */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goBack(){
const screens=document.querySelectorAll('.screen.active');
const active=screens[0]?.id;
if(active==='s-variants'){wakeLockOff();show('s-select');}
else if(active==='s-setup'){
if(cameFromVariants){show('s-variants');}
else{wakeLockOff();show('s-select');}
}else{wakeLockOff();show('s-select');}
}
function goHome(){stopBrew();document.getElementById('finish').classList.remove('show');wakeLockOff();show('s-select');}

/* ═══════════════════════════════════════════

   ═══════════════════════════════════════════ */
function buildList(){
const byYear={};
RECIPES.forEach(r=>{if(!byYear[r.year])byYear[r.year]=[];byYear[r.year].push(r);});
const years=Object.keys(byYear).sort((a,b)=>b-a);
document.getElementById('recipe-list').innerHTML=years.map(year=>`
<div class="year-group">
<div class="year-header">${year}</div>
${byYear[year].map(r=>{
if(r.isVariantGroup){
return `<div class="recipe-card place-${r.place}" onclick="openVariants()">
<div class="rc-top">
<div class="rc-place">${medals[r.place]}</div>
<div class="rc-info">
<div class="rc-name">${r.champion}</div>
<div class="rc-method">${r.dripper}</div>
</div>
<div class="rc-flag">${r.flag}</div>
</div>
<div class="rc-variant-hint">5 variações de perfil →</div>
</div>`;
}
return `<div class="recipe-card place-${r.place}" onclick="pickRecipe('${r.id}')">
<div class="rc-top">
<div class="rc-place">${medals[r.place]}</div>
<div class="rc-info">
<div class="rc-name">${r.champion}</div>
<div class="rc-method">${r.dripper}</div>
</div>
<span class="rc-ratio">1:${r.ratio.toFixed?r.ratio.toFixed(1):r.ratio}</span>
<div class="rc-flag">${r.flag}</div>
</div>
</div>`;
}).join('')}
</div>`).join('');
}

<span class="var-emoji">${v.emoji}</span>
</div>
<div class="var-formula">${v.pourFormula}</div>
<div class="var-desc">${v.desc}</div>
</div>`).join('');
show('s-variants');
}

function pickKasuya(i){
ensureAudio();wakeLockOn();
const v=KASUYA[i];
R={...v,champion:'Tetsu Kasuya',country:'Japão',flag:'🇯🇵',year:2016,place:1,
dripper:'V60 · 4:6 '+v.variantName+' '+v.emoji,
steps:JSON.parse(JSON.stringify(v.steps))};
dose=18;cameFromVariants=true;
document.getElementById('s2-title').textContent=`🥇 2016 · Kasuya · ${v.variantName} ${v.emoji}`;
renderSetup();show('s-setup');
}

/* ═══ PICK RECIPE ═══ */
function pickRecipe(id){
ensureAudio();wakeLockOn();
R=JSON.parse(JSON.stringify(RECIPES.find(r=>r.id===id)));
dose=18;cameFromVariants=false;
document.getElementById('s2-title').textContent=`${medals[R.place]} ${R.year} · ${R.champion.split(' ').pop()} · 1:${R.ratio.toFixed?R.ratio.toFixed(1):R.ratio}`;
renderSetup();show('s-setup');
}

/* ═══ SETUP ═══ */
function renderSetup(){
const tw=totalW();
document.getElementById('dose-val').textContent=dose;
document.getElementById('water-val').textContent=rnd(tw);
document.getElementById('pours-table').innerHTML=R.steps.filter(s=>s.type==='pour').map(s=>`
<div class="pour-row">
<div class="pour-name">${s.label}</div>
<div class="pour-temp">${s.temp}°C</div>
<div class="pour-amt">${rnd(pourMl(s))}ml</div>
</div>`).join('');
}
function changeDose(d){dose=Math.max(1,Math.min(80,dose+d));renderSetup();}

/* ═══════════════════════════════════════════
   COUNTDOWN 3-2-1
   ═══════════════════════════════════════════ */
function beginCountdown(){
ensureAudio();
show('s-brew');wakeLockOn();
const ovl=document.getElementById('cd-overlay');
const num=document.getElementById('cd-num');
const msg=document.getElementById('cd-msg');
ovl.classList.add('show');
let c=3;
function tick(){
num.textContent=c;
num.style.animation='none';void num.offsetWidth;num.style.animation='';
beep(350+c*90,.15,.25);vib(50);
c--;
if(c>0){setTimeout(tick,900);}
else{
setTimeout(()=>{
num.style.display='none';msg.style.display='none';
const go=document.createElement('div');
go.className='countdown-go';go.textContent='DESPEJE!';
ovl.appendChild(go);
beep(880,.45,.4);vib(220);
setTimeout(()=>{
ovl.classList.remove('show');
go.remove();num.style.display='';msg.style.display='';
startBrew();
},750);
},900);
}
}
tick();
}

/* ═══════════════════════════════════════════
   BREW ENGINE
   ═══════════════════════════════════════════ */
function startBrew(){
t0=Date.now();curIdx=0;
buildDots();
renderStep(0);
clearInterval(ticker);
ticker=setInterval(brewTick,80);
}

function brewTick(){
const elapsed=(Date.now()-t0)/1000;
document.getElementById('brew-clock').textContent=fmtMs(Date.now()-t0);
const steps=R.steps;
let newIdx=0;
for(let i=0;i<steps.length;i++){if(elapsed>=steps[i].atSec)newIdx=i;}
if(newIdx!==curIdx){curIdx=newIdx;onStepChange(curIdx);}
updateNextBar(elapsed);
updateRing(elapsed);
updateDots();
}

function onStepChange(idx){
const s=R.steps[idx];
flash();
if(s.type==='pour'){beepSeq([[600,.1,.25,0],[880,.35,.35,.12]]);vib([90,30,150]);}
else if(s.type==='serve'){beepSeq([[440,.12,.2,0],[550,.12,.2,.18],[660,.12,.2,.36],[880,.3,.3,.54]]);vib([80,40,100,40,200]);}
else{beep(440,.18,.2);vib(70);}
renderStep(idx);
}

/* ═══ PROGRESS DOTS ═══ */
function buildDots(){
const el=document.getElementById('prog-dots');
el.innerHTML=R.steps.map((_,i)=>`<div class="pdot" id="dot${i}"></div>`).join('');
}
function updateDots(){
R.steps.forEach((_,i)=>{
const d=document.getElementById('dot'+i);
if(!d)return;
d.className='pdot';
if(i<curIdx)d.classList.add('done');
if(i===curIdx)d.classList.add('active');
});
}

/* ═══ RENDER STEP ═══ */
function renderStep(idx){
const s=R.steps[idx];
const tw=totalW();
const area=document.getElementById('step-area');

if(s.type==='pour'){
const ml=pourMl(s);
const acc=accumulatedAt(idx);
const pct=Math.min(100,acc/tw*100);
area.innerHTML=`<div class="step-pour">
<div class="step-type">☕ DESPEJE AGORA</div>
<div class="step-name">${s.label}</div>
<div class="step-values">
<div class="value-box">
<div class="value-label">Adicionar</div>
<div class="value-main">${rnd(ml)}</div>
<div class="value-unit">ml</div>
</div>
<div class="value-box">
<div class="value-label">Temperatura</div>
<div class="value-main">${s.temp}°</div>
<div class="value-unit">C</div>
</div>
</div>
<div class="step-progress">
<div class="step-progress-fill" style="width:${pct}%"></div>
</div>
<div class="step-accum-big">
<div class="accum-label">TOTAL</div>
<div><span class="accum-val">${rnd(acc)}</span><span class="accum-unit">ml</span></div>
<div class="accum-total">de ${rnd(tw)} ml</div>
</div>
</div>`;
}
else if(s.type==='wait'){
const dur=s.dur||0;
const C=2*Math.PI*78;
area.innerHTML=`<div class="step-wait">
<div class="step-type">⏱ AGUARDAR</div>
<div class="step-name">${s.label}</div>
<div class="countdown-ring">
<svg width="180" height="180" viewBox="0 0 180 180">
<circle class="ring-bg" cx="90" cy="90" r="78"/>
<circle class="ring-fill" id="ring-fill" cx="90" cy="90" r="78"
stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="0"/>
</svg>
<div class="ring-time" id="ring-time">${fmtS(dur)}</div>
</div>
</div>`;
}
else if(s.type==='drain'){
const dur=s.dur||0;
const C=2*Math.PI*78;
area.innerHTML=`<div class="step-drain">
<div class="step-type">⬇ DRENAGEM</div>
<div class="step-name">${s.label}</div>
<div class="countdown-ring">
<svg width="180" height="180" viewBox="0 0 180 180">
<circle class="ring-bg" cx="90" cy="90" r="78"/>
<circle class="ring-fill" id="ring-fill" cx="90" cy="90" r="78"
stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="0"/>
</svg>
<div class="ring-time" id="ring-time">${dur>0?fmtS(dur):'—'}</div>
</div>
</div>`;
}
else if(s.type==='serve'){
area.innerHTML=`<div class="step-serve">
<div class="serve-icon">☕</div>
<div class="step-type">✓ PRONTO</div>
<div class="step-name">${s.label}</div>
</div>`;
setTimeout(showFinish,4500);
}
}

/* ═══ RING UPDATE (wait + drain) ═══ */
function updateRing(elapsed){
const s=R.steps[curIdx];
if(s.type!=='wait'&&s.type!=='drain')return;
const dur=s.dur||0;
if(dur<=0)return;
const inStep=elapsed-s.atSec;
const remaining=Math.max(0,dur-inStep);
const prog=Math.min(1,inStep/dur);
const C=2*Math.PI*78;
const fill=document.getElementById('ring-fill');
const time=document.getElementById('ring-time');
if(fill)fill.style.strokeDashoffset=(C*(1-prog)).toFixed(1);
if(time)time.textContent=fmtS(Math.ceil(remaining));
}

/* ═══ NEXT BAR ═══ */
function updateNextBar(elapsed){
const steps=R.steps;
const bar=document.getElementById('next-bar');
const nextIdx=curIdx+1;
if(nextIdx>=steps.length){
bar.innerHTML='<div class="next-content"><span class="next-action" style="text-align:center;color:var(--text-dim)">Última etapa</span></div>';
bar.className='next-bar';
return;
}
const ns=steps[nextIdx];
const secsLeft=ns.atSec-elapsed;
let typeStr='';
if(ns.type==='pour')typeStr=`☕ ${ns.label} · ${rnd(pourMl(ns))}ml · ${ns.temp}°C`;
else if(ns.type==='serve')typeStr='✓ Servir';
else if(ns.type==='wait')typeStr=`⏱ ${ns.label}`;
else if(ns.type==='drain')typeStr=`⬇ ${ns.label}`;
else typeStr=ns.label;

bar.className='next-bar';
if(secsLeft<=8&&secsLeft>3)bar.className='next-bar urgent';
if(secsLeft<=3&&secsLeft>0)bar.className='next-bar critical';

bar.innerHTML=`<div class="next-content">
<span class="next-label">A seguir</span>
<span class="next-action">${typeStr}</span>
<span class="next-countdown">${secsLeft>0?fmtS(Math.ceil(secsLeft)):'agora'}</span>
</div>`;
}

/* ═══ FINISH ═══ */
function showFinish(){
clearInterval(ticker);wakeLockOff();
document.getElementById('finish-time').textContent=fmtMs(Date.now()-t0);
document.getElementById('finish-sub').innerHTML=`${medals[R.place]||''} ${R.champion} · ${R.year}<br>${R.dripper}`;
document.getElementById('finish').classList.add('show');
}

function stopBrew(){clearInterval(ticker);ticker=null;wakeLockOff();}
function confirmReset(){if(confirm('Reiniciar?')){stopBrew();show('s-setup');}}

/* ═══ INIT ═══ */
buildList();
</script>
</body>
</html>
